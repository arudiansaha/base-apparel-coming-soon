<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->
  <link rel="stylesheet" type="text/css" href="./style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <title>Frontend Mentor | Base Apparel coming soon page</title>
</head>

<body>
  <header class="site__header">
    <img src="./images/logo.svg" alt="Base Apparel's logos" />
  </header>

  <main class="site__main">
    <section class="description">
      <header class="description__header">
        <img class="description__logo" src="./images/logo.svg" alt="Base Apparel's logos" />
        <h1 class="description__title site__color--red3">
          <span class="description__title--custom site__color--red2-600">We're</span> coming soon
        </h1>
      </header>

      <section class="description__text site__color--red2-600">
        <p>
          Hello fellow shoppers! We're currently building our new fashion store.
          Add your email below to stay up-to-date with announcements and our launch deals.
        </p>
      </section>

      <section>
        <form class="form">
          <fieldset class="form__field">
            <input class="form__input site__color--red3" id="input-email" type="email" placeholder="Email Address"
              required />
          </fieldset>
          <img class="form__error" src="./images/icon-error.svg" alt="Error" />
          <div class="form__ghost-button">button</div>
          <button class="form__button form__button--linear2" id="submit-email" onclick="validation()">
            <img src="./images/icon-arrow.svg" alt="Button">
          </button>
        </form>
        <p id="error-message" class="form__message site__color--red2">&nbsp;</p>
      </section>
    </section>

    <section class="cover">
      <img class="cover__image" src="./images/hero-desktop.jpg" alt="Beautiful woman with red shirt" />
    </section>
  </main>

  <footer class="site__footer">
    <p class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
      Coded by <a href="https://github.com/arudiansaha">Rizky Ardiansyah</a>.
    </p>
  </footer>

  <script>
    function validation() {
      const email = document.getElementById('input-email');
      const message = document.getElementById('error-message');

      if (!email.checkValidity()) {
        message.innerHTML = email.validationMessage;
      }
    };

    document.addEventListener('invalid', (function () {
      return function (e) {
        e.preventDefault();
        document.getElementById('input-email').focus();
      };
    })(), true);
  </script>

</body>

</html>
